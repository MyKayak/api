services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      # Automatically run setup.sql on the first initialization
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
      # Persist the database data even if the container stops
      - db_data:/var/lib/mysql

  app:
    build: .
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  worker:
    build: .
    restart: always
    command: bash -c "cd /var/www/scripts && bash worker.sh"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./src:/var/www/html
      - ./scripts:/var/www/scripts
    depends_on:
      - db

volumes:
  db_data:
